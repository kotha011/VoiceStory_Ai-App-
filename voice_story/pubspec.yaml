name: voice_story
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0' # Adjusted to a standard stable range

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.5
  image_picker: ^1.2.1     # Required for the Profile Photo feature
  uuid: ^4.4.0             # Required for generating unique History IDs
  record: 5.1.0
  audioplayers: 5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/image/background.jpeg
    - assets/image/logo.png    # Added since it was used in your Start6 code

dependency_overrides:
  record_platform_interface: 1.2.0
  record_linux: 0.7.2
